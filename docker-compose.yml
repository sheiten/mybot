version: '3.8'

services:
  proxybot:
    image: python:3.12-slim
    container_name: telegram-proxy-bot
    restart: unless-stopped
    working_dir: /app
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      # Раскомментируйте строку ниже и впишите ваш прокси, если он есть на сервере:
      # - PROXY_URL=socks5://172.17.0.1:1080
    volumes:
      - ./bot.py:/app/bot.py # Привязываем локальный файл к контейнеру
    command: sh -c "pip install --no-cache-dir python-telegram-bot aiohttp httpx && python /app/bot.py"
