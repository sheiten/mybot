version: '3.8'

services:
  proxybot:
    image: python:3.12-slim
    container_name: telegram-proxy-bot
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "
      pip install --no-cache-dir python-telegram-bot aiohttp &&
      python bot.py
      "
    volumes:
      - ./bot.py:/app/bot.py
