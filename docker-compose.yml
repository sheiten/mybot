version: '3.8'

services:
  proxybot:
    image: python:3.12-slim
    container_name: telegram-proxy-bot
    restart: unless-stopped
    working_dir: /app
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
    command: >
      sh -c "
      apt-get update && apt-get install -y curl &&
      pip install --no-cache-dir python-telegram-bot aiohttp httpx &&
      curl -sL https://raw.githubusercontent.com/sheiten/mybot/main/bot.py -o /app/bot.py &&
      python /app/bot.py
      "
